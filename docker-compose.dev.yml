version: '3.8'

services:
  # Development version with hot reloading
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cognitive-fabric-app-dev
    ports:
      - "${PORT:-3001}:3001"
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres-dev
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-cognitive_fabric_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - NEO4J_URI=bolt://neo4j-dev:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - REDIS_URL=redis://redis-dev:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-not-for-production}
      - ENABLE_MOCK_SERVICES=true
      - ENABLE_DEBUG_ROUTES=true
      - LOG_LEVEL=debug
    depends_on:
      postgres-dev:
        condition: service_healthy
      neo4j-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - cognitive-fabric-dev-network
    command: ["npm", "run", "dev"]

  # Development PostgreSQL
  postgres-dev:
    image: postgres:15-alpine
    container_name: cognitive-fabric-postgres-dev
    environment:
      - POSTGRES_DB=${DB_NAME:-cognitive_fabric_dev}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - cognitive-fabric-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cognitive_fabric_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Development Neo4j
  neo4j-dev:
    image: neo4j:5.15-community
    container_name: cognitive-fabric-neo4j-dev
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_dev_data:/data
      - neo4j_dev_logs:/logs
    restart: unless-stopped
    networks:
      - cognitive-fabric-dev-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Development Redis
  redis-dev:
    image: redis:7-alpine
    container_name: cognitive-fabric-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    networks:
      - cognitive-fabric-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Development tools
  adminer:
    image: adminer:latest
    container_name: cognitive-fabric-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres-dev
    depends_on:
      - postgres-dev
    networks:
      - cognitive-fabric-dev-network

# Development volumes
volumes:
  postgres_dev_data:
  neo4j_dev_data:
  neo4j_dev_logs:
  redis_dev_data:

# Development network
networks:
  cognitive-fabric-dev-network:
    driver: bridge