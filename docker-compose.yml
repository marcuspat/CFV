version: '3.8'

services:
  # Cognitive Fabric Visualizer Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognitive-fabric-app
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-cognitive_fabric}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VERIFICATION_THRESHOLD=${VERIFICATION_THRESHOLD:-0.95}
      - MAX_CONCURRENT_CONNECTIONS=${MAX_CONCURRENT_CONNECTIONS:-100}
      - COGNITIVE_PROCESSING_TIMEOUT=${COGNITIVE_PROCESSING_TIMEOUT:-30000}
      - WEBSOCKET_HEARTBEAT=${WEBSOCKET_HEARTBEAT:-30000}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cognitive-fabric-postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-cognitive_fabric}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    # ports removed — app reaches postgres via internal network only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cognitive_fabric}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: cognitive-fabric-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    # ports removed — app reaches neo4j via internal network only (bolt://neo4j:7687)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cognitive-fabric-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    # ports removed — app reaches redis via internal network only (redis://redis:6379)
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: cognitive-fabric-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    profiles:
      - production

  # ML Service (Optional)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: cognitive-fabric-ml
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./ml-models:/app/models
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    profiles:
      - ml

  # Rasa Service (Optional)
  rasa:
    image: rasa/rasa:3.6.20
    container_name: cognitive-fabric-rasa
    ports:
      - "5005:5005"
    volumes:
      - ./rasa:/app
    command: ["rasa", "run", "--enable-api", "--cors", "*", "--debug"]
    restart: unless-stopped
    networks:
      - cognitive-fabric-network
    security_opt:
      - no-new-privileges:true
    profiles:
      - rasa

# Volumes
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  redis_data:
    driver: local

# Networks
networks:
  cognitive-fabric-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
