[tool:pytest]
# pytest configuration for Cognitive Fabric Visualizer ML components

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests/ml tests/performance tests/integration

# Output configuration
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src/ml
    --cov-report=term-missing
    --cov-report=html:coverage/html
    --cov-report=xml:coverage/coverage.xml
    --cov-report=json:coverage/coverage.json
    --cov-fail-under=80
    --durations=10
    --maxfail=5
    -ra

# Markers for different test types
markers =
    unit: Unit tests for individual components
    integration: Integration tests between components
    api: API endpoint tests
    ml: Machine learning model tests
    performance: Performance and benchmark tests
    slow: Tests that take longer to run
    external: Tests that require external services
    gpu: Tests that require GPU acceleration
    memory_intensive: Tests that use significant memory
    accuracy: Tests for model accuracy validation
    smoke: Quick smoke tests

# Minimum version required
minversion = 6.0

# Test session configuration
timeout = 300
timeout_method = thread

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Console output
console_output_style = progress

# Warnings handling
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:tensorflow.*
    ignore::UserWarning:torch.*
    error::ResourceWarning

# Coverage configuration
[coverage:run]
source = src/ml
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = coverage/html

[coverage:xml]
output = coverage/coverage.xml

# Parallel execution
[pytest-xdist]
# Run tests in parallel when using -n option
# Adjust based on available CPU cores
workers = auto